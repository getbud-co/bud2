services:
  db:
    image: postgres:18-alpine
    container_name: bud-db
    environment:
      POSTGRES_DB: bud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev-api
    container_name: bud-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=bud;Username=postgres;Password=postgres
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "1"
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "1"
      OTEL_SERVICE_NAME: Bud.Api
    ports:
      - "8082:8080"
    volumes:
      - ./backend/src:/src/src
      - ./backend/Directory.Build.props:/src/Directory.Build.props
      - nuget_cache:/root/.nuget/packages
      - dotnet_obj:/tmp/obj
      - dotnet_bin:/tmp/bin
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bud-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8082
    ports:
      - "8080:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/.next
      - /app/node_modules
    depends_on:
      - api

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev-mcp
    container_name: bud-mcp
    environment:
      DOTNET_ENVIRONMENT: Development
      BUD_API_BASE_URL: http://api:8082
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "1"
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "1"
      OTEL_SERVICE_NAME: Bud.Mcp
    ports:
      - "8081:8080"
    volumes:
      - ./backend/src:/src/src
      - ./backend/Directory.Build.props:/src/Directory.Build.props
      - nuget_cache:/root/.nuget/packages
      - dotnet_obj:/tmp/obj
      - dotnet_bin:/tmp/bin
    depends_on:
      - api

volumes:
  postgres_data:
  nuget_cache:
  dotnet_obj:
  dotnet_bin:
